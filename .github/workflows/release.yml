name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release (e.g. v0.1.0)
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  matrix:
    name: Resolve versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Read Minecraft versions from settings.gradle.kts
        id: read
        run: |
          versions=$(sed -n 's/.*versions(\(.*\)).*/\1/p' settings.gradle.kts \
            | tr -d '" ' | tr ',' '\n' | grep -v '^$' | jq -R . | jq -sc .)
          echo "versions=$versions" >> "$GITHUB_OUTPUT"
          echo "Resolved: $versions"

  build:
    name: Build ${{ matrix.minecraft }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        minecraft: ${{ fromJson(needs.matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew ":${{ matrix.minecraft }}:build" --stacktrace

      - name: Collect jars
        run: |
          mkdir -p dist
          find "versions/${{ matrix.minecraft }}/build/libs" -name '*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-dev.jar' \
            ! -name '*-sources-dev.jar' \
            -exec cp {} dist/ \;
          ls -la dist
          test -n "$(ls -A dist)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packhand-${{ matrix.minecraft }}
          path: dist/*.jar
          if-no-files-found: error

  github-release:
    name: GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all jars
        uses: actions/download-artifact@v4
        with:
          pattern: packhand-*
          merge-multiple: true
          path: dist

      - name: Checksums
        run: |
          cd dist
          sha256sum *.jar > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            dist/*.jar
            dist/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

  modrinth:
    name: Modrinth ${{ matrix.minecraft }}
    needs: [ matrix, build, github-release ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        minecraft: ${{ fromJson(needs.matrix.outputs.versions) }}
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
    steps:
      - name: Download jar
        if: env.MODRINTH_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: packhand-${{ matrix.minecraft }}
          path: dist

      - name: Fetch release notes
        if: env.MODRINTH_TOKEN != ''
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<CHANGELOG_EOF'
            gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth
        if: env.MODRINTH_TOKEN != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: dist/*.jar
          name: Packhand ${{ env.TAG }} for Minecraft ${{ matrix.minecraft }}
          version: ${{ steps.notes.outputs.version }}+${{ matrix.minecraft }}
          changelog: ${{ steps.notes.outputs.body }}
          loaders: fabric
          game-versions: ${{ matrix.minecraft }}
          java: 25
          dependencies: |
            fabric-api(required)
