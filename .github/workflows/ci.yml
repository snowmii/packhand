name: CI

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix:
    name: Resolve versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - uses: actions/checkout@v4

      - name: Read Minecraft versions from settings.gradle.kts
        id: read
        run: |
          versions=$(sed -n 's/.*versions(\(.*\)).*/\1/p' settings.gradle.kts \
            | tr -d '" ' | tr ',' '\n' | grep -v '^$' | jq -R . | jq -sc .)
          echo "versions=$versions" >> "$GITHUB_OUTPUT"
          echo "Resolved: $versions"

  build:
    name: Build ${{ matrix.minecraft }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft: ${{ fromJson(needs.matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew ":${{ matrix.minecraft }}:build" --stacktrace

      - name: Collect jars
        run: |
          mkdir -p dist
          find "versions/${{ matrix.minecraft }}/build/libs" -name '*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-dev.jar' \
            ! -name '*-sources-dev.jar' \
            -exec cp {} dist/ \;
          ls -la dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packhand-${{ matrix.minecraft }}
          path: dist/*.jar
          if-no-files-found: error
          retention-days: 14
